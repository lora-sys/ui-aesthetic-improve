name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 1: Lint + Build + Unit Tests ────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["18", "20", "22"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run tests
        run: |
          # Tests use a fake CLI so no real agy/gemini needed
          npx tsx --test index.test.ts
        env:
          # Point to fake CLI — tests create this themselves in before()
          AGY_PATH: ${{ github.workspace }}/fixtures/fake-agy.sh
          GEMINI_MODEL: gemini-3.5-flash
          TIMEOUT_MINUTES: "1"

      - name: Verify dist/index.js is executable
        run: |
          node dist/index.js --version 2>/dev/null || true
          # Server should start (it exits if no stdin), just check it compiles
          echo "✅ dist/index.js is valid"

  # ─── Job 2: Visual diff smoke test ───────────────────────────────────────────
  visual-diff-smoke:
    name: Visual diff smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Run visual diff on fixtures
        run: |
          node --input-type=module -e "
          import { generateDiffReport } from './dist/visual-diff.js';
          import { existsSync } from 'fs';
          const report = generateDiffReport(
            'fixtures/ugly.html',
            'fixtures/ugly.html',  // same file = trivial diff, score 0
            '/tmp'
          );
          console.log('Report:', report.reportPath);
          console.log('Score:', report.summary.estimatedImprovementScore);
          if (!existsSync(report.reportPath)) {
            process.exit(1);
          }
          console.log('✅ visual-diff smoke test passed');
          "

  # ─── Job 3: Publish to npm (on GitHub Release only) ──────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [test, visual-diff-smoke]
    if: github.event_name == 'release' && github.event.action == 'published'

    permissions:
      contents: read
      id-token: write   # for npm provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run build

      - name: Verify version matches release tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG_VERSION#v}"   # strip leading 'v'
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ package.json version ($PKG_VERSION) != release tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✅ Version matches: $PKG_VERSION"

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "## 🚀 Published to npm" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** ui-aesthetics-mcp@$(node -p "require('./package.json').version")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install with:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "claude mcp add ui-aesthetics-mcp -- npx -y ui-aesthetics-mcp" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

name: PR Visual Diff

on:
  pull_request:
    paths:
      - "**/*.html"
      - "**/*.css"
      - "**/*.jsx"
      - "**/*.tsx"
      - "**/*.vue"
      - "**/*.svelte"

jobs:
  visual-diff-comment:
    name: Generate visual diff comment
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for diff

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Get changed UI files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '\.(html|css|jsx|tsx|vue|svelte)$' | head -5 || true)
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Changed UI files: $FILES"

      - name: Generate diff reports
        if: steps.changed.outputs.files != ''
        id: reports
        run: |
          mkdir -p /tmp/diff-reports
          COMMENT=""
          for FILE in ${{ steps.changed.outputs.files }}; do
            if [ -f "$FILE" ]; then
              # Get the before version from base branch
              git show origin/${{ github.base_ref }}:"$FILE" > /tmp/before.html 2>/dev/null || continue
              
              # Run visual diff
              node -e "
              import('./dist/tools/visual-diff.js').then(({ generateDiffReport }) => {
                const report = generateDiffReport(
                  '/tmp/before.html',
                  '$FILE',
                  '/tmp/diff-reports',
                  { before: 'main ($FILE)', after: 'PR ($FILE)' }
                );
                const s = report.summary;
                console.log(JSON.stringify({
                  score: s.estimatedImprovementScore,
                  linesAdded: s.linesAdded,
                  linesRemoved: s.linesRemoved,
                  cssPropsAdded: s.cssPropsAdded,
                  classesAdded: s.classesAdded.slice(0,5),
                  reportPath: report.reportPath
                }));
              }).catch(e => { console.error(e); process.exit(1); });
              " 2>/dev/null | tail -1 > /tmp/result.json
              
              SCORE=$(cat /tmp/result.json | node -e "process.stdin.on('data',d=>{try{console.log(JSON.parse(d).score)}catch{console.log('?')}})")
              ADDED=$(cat /tmp/result.json | node -e "process.stdin.on('data',d=>{try{console.log(JSON.parse(d).linesAdded)}catch{console.log('?')}})")
              
              if [ "$SCORE" -ge 50 ] 2>/dev/null; then
                EMOJI="✅"
              elif [ "$SCORE" -ge 20 ] 2>/dev/null; then
                EMOJI="🟡"
              else
                EMOJI="ℹ️"
              fi
              
              COMMENT="${COMMENT}
          ### ${EMOJI} \`${FILE}\`
          | Metric | Value |
          |--------|-------|
          | Improvement score | **${SCORE}/100** |
          | Lines added | +${ADDED} |
          "
            fi
          done
          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post PR comment
        if: steps.changed.outputs.files != '' && steps.reports.outputs.comment != ''
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 🎨 UI Aesthetics Report
            
            ${process.env.COMMENT}
            
            ---
            *Generated by [ui-aesthetics-mcp](https://github.com/your-org/ui-aesthetics-mcp)*`;
            
            // Update existing comment if present, otherwise create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => 
              c.user.type === 'Bot' && c.body.includes('UI Aesthetics Report')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          COMMENT: ${{ steps.reports.outputs.comment }}
